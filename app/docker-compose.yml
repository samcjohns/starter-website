services:
  # Cloudflare Tunnel client
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "list"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 30s

  # WordPress database
  wordpress-mysql:
    image: mysql:8
    container_name: wordpress-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${WP_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WP_MYSQL_DATABASE}
      MYSQL_USER: ${WP_MYSQL_USER}
      MYSQL_PASSWORD: ${WP_MYSQL_PASSWORD}
    volumes:
      - wordpress_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # WordPress application
  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      wordpress-mysql:
        condition: service_healthy
      cloudflared:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: wordpress-mysql:3306
      WORDPRESS_DB_NAME: ${WP_MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${WP_MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${WP_MYSQL_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'https://example.com');
        define('WP_SITEURL', 'https://example.com');
    volumes:
      - wordpress_data:/var/www/html
    expose:
      - "80"

  # Redirect legacy hostnames to apex domain
  redirect:
    image: nginx:alpine
    container_name: redirect
    restart: unless-stopped
    volumes:
      - ./redirect/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"

  # n8n automation
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_WEBHOOK_URL}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_AUTH_EXCLUDE_ENDPOINTS=/webhook/*
      - GENERIC_TIMEZONE=UTC
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_PERSONALIZATION_ENABLED=true
      - N8N_TEMPLATES_ENABLED=true
      - N8N_DIAGNOSTICS_ENABLED=true
      - N8N_VERSION_NOTIFICATIONS_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    depends_on:
      cloudflared:
        condition: service_healthy
    networks:
      default:
        aliases:
          - n8n.internal

volumes:
  wordpress_data:
  wordpress_mysql_data:
  n8n_data: